name: Build and Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            set -e
            APP_DIR="/home/ubuntu/applications/industry-saas/client"
            cd $APP_DIR

            PREVIOUS_COMMIT=$(git rev-parse HEAD)

            deploy() {
              echo "📥 Pulling latest code..."
              git fetch origin main
              git reset --hard origin/main

              echo "📦 Installing dependencies..."
              pnpm install --frozen-lockfile

              echo "🏗️ Building project..."
              pnpm run build

              echo "🔄 Restarting PM2..."
              pm2 restart industry-snl-client --update-env || pm2 start pnpm --name "industry-snl-client" -- start -p 3005
              pm2 save
            }

            rollback() {
              echo "❌ Deploy failed! Rolling back to $PREVIOUS_COMMIT..."
              git reset --hard $PREVIOUS_COMMIT
              pnpm install --frozen-lockfile
              pnpm run db:setup:prod
              pnpm run build
              pm2 restart industry-snl-client
              exit 1
            }

            deploy || rollback
            echo "✅ Deployment complete!"